name: Run E2E Tests

on:
  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout E2E repo (tests)
      - name: Checkout E2E repo
        uses: actions/checkout@v4

      # 2. Checkout Backend repo into 'backend'
      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: maintaintoolepam/MaintAIn-Vacation-BE
          path: backend

      # 3. Checkout Frontend repo into 'frontend'
      - name: Checkout Frontend
        uses: actions/checkout@v4
        with:
          repository: maintaintoolepam/MaintAIn-Vacation-FE
          path: frontend

      # 4. Setup Node for tests
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 5. Install E2E dependencies
      - name: Install E2E dependencies
        run: npm ci

      # 6. Install Playwright browsers
      - name: Install Playwright
        run: npx playwright install --with-deps

      # 6a. Install backend & frontend dependencies
      - name: Install Backend & Frontend dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      # 6b. Start backend server
      - name: Start Backend
        run: |
          cd backend
          npm run start &
          echo "Waiting for backend to start..."
          npx wait-on http://localhost:8181

      # 6c. Start frontend server
      - name: Start Frontend
        run: |
          cd frontend
          npm run dev &
          echo "Waiting for frontend to start..."
          npx wait-on http://localhost:5173

      # 7. Run E2E tests
      - name: Run Playwright tests
        env:
          TEST_USER: user
          TEST_PASSWORD: user123
          BACKEND_URL: http://localhost:8181
        run: npx playwright test --reporter=html

      # 8. Upload Playwright report
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/